<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>lemonsaur-inspired — homepage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="desktop">
    <header class="menubar">
      <div class="menu-left"></div>
      <div class="menu-center">Finder  Edit  View  Go  Window  Help</div>
      <div class="menu-right" id="menu-date"></div>
    </header>

    <section class="window">
      <div class="titlebar">about — Dhiness. C</div>
      <div class="window-body">
        <div id="terminal" class="terminal" aria-live="polite">
          <div class="terminal-output" id="terminal-output"></div>
          <form id="terminal-form" class="terminal-form">
            <label for="cmd" class="sr-only">Command</label>
            <input id="cmd" class="terminal-input" autocomplete="off" autofocus />
          </form>
        </div>
      </div>
    </section>
    <script src="terminal.js"></script>
  </div>
</body>
</html>
